<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #1a1410;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: #f5f0e8;
    border-radius: 20px;
    overflow: hidden;
    animation: rise 0.9s cubic-bezier(.22,1,.36,1) both;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  @keyframes rise { from{opacity:0;transform:translateY(24px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

  .card-top-line { height: 3px; background: linear-gradient(90deg, #8b4513, #c9a84c, #8b4513); }

  /* 헤더 — 좌텍스트 우사진 50:50 */
  .card-header {
    background: #1a1410;
    display: flex;
    align-items: center;
    height: 200px;
    padding: 0 20px;
    gap: 0;
  }

  /* 좌측 텍스트 — 50%, 완전 중앙 */
  .card-text {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding-right: 10px;
  }
  .card-badge {
    font-size: 7px;
    letter-spacing: 0.13em;
    color: #c9a84c;
    border: 1px solid rgba(201,168,76,0.35);
    padding: 3px 8px;
    display: inline-block;
    margin-bottom: 10px;
    white-space: nowrap;
  }
  .card-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 40px;
    font-weight: 700;
    color: #f5f0e8;
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 5px;
  }
  .card-name span { color: #c9a84c; }
  .card-name-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 10px;
    color: #7a6e62;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .card-tagline {
    font-size: 10px;
    color: #c4b5a5;
    line-height: 1.85;
    border-left: 2px solid #c9a84c;
    padding-left: 9px;
    text-align: left;
  }

  /* 우측 — 50%, 동그라미 사진 중앙 */
  .card-photo-wrap {
    width: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-photo {
    width: 155px;
    height: 155px;
    border-radius: 50%;
    border: 2.5px solid #c9a84c;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .card-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .gold-divider { height: 1px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); }

  /* 역할 태그 */
  .roles-wrap {
    background: #1a1410;
    padding: 14px 20px 16px;
  }
  .roles-row {
    display: flex;
    justify-content: center;
    gap: 7px;
    margin-bottom: 7px;
  }
  .roles-row:last-child { margin-bottom: 0; }
  .role-tag {
    font-size: 9px;
    letter-spacing: 0.05em;
    color: #c4b5a5;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 4px 11px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* 본문 */
  .card-body { padding: 18px 18px 22px; }
  .contact-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 7px; }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 13px;
    border-radius: 10px;
    text-decoration: none;
    color: #1a1410;
    background: #fff;
    transition: background 0.15s;
    border: 1px solid #ede8dc;
  }
  .contact-item:hover { background: #ede8dc; }
  .contact-item:active { transform: scale(0.99); }
  .contact-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #8b4513;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon svg { width: 14px; height: 14px; fill: #f5f0e8; }
  .contact-value { font-size: 13.5px; font-weight: 500; color: #1a1410; flex: 1; }
  .contact-arrow { font-size: 14px; color: #c4b5a5; }

  .diag-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 15px;
    background: #8b4513;
    border-radius: 10px;
    color: #f5f0e8;
    margin-top: 7px;
    transition: background 0.18s;
    cursor: pointer;
    border: none;
    width: 100%;
    font-family: inherit;
    text-decoration: none;
  }
  .diag-btn:hover { background: #7a3a10; }
  .diag-title { font-size: 12.5px; font-weight: 500; text-align: left; }
  .diag-sub { font-size: 10px; color: rgba(245,240,232,0.6); margin-top: 1px; }

  .location-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid #e0d8cc;
  }
  .location-dot { width: 5px; height: 5px; border-radius: 50%; background: #c9a84c; flex-shrink: 0; }
  .location-text { font-size: 10px; color: #7a6e62; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-bottom-line { height: 3px; background: linear-gradient(90deg, #8b4513, #c9a84c, #8b4513); }
</style>
